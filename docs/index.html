<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>5ivesaw — snake</title>
<meta name="theme-color" content="#0d1117" />

<!-- Font: preconnect & preload for better performance -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    color: #8b949e;
    font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 12px;
  }
  .header h1 {
    font-size: 14px;
    font-weight: 700;
    color: #C41E3A;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .score {
    font-size: 12px;
    color: #484f58;
  }
  .score span { color: #C41E3A; }

  /* Canvas visually 400x400 but rendered at device pixel ratio */
  canvas {
    border: 1px solid #21262d;
    display: block;
    image-rendering: pixelated;
    width: 400px;
    height: 400px;
    max-width: 90vw;
    max-height: 90vw;
  }

  .controls {
    margin-top: 12px;
    font-size: 11px;
    color: #484f58;
    text-align: center;
    line-height: 1.6;
  }
  .controls kbd {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 3px;
    padding: 1px 6px;
    font-size: 10px;
    color: #8b949e;
  }

  /* overlays: use visibility/opacity for transitions rather than inline display toggles */
  .overlay {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    pointer-events: none;
    visibility: hidden;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.12s ease, visibility 0.12s ease, transform 0.12s ease;
  }
  .overlay.active {
    pointer-events: all;
    visibility: visible;
    opacity: 1;
    transform: translateY(0);
  }
  .overlay h2 {
    font-size: 13px;
    color: #C41E3A;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .overlay p {
    font-size: 11px;
    color: #484f58;
  }
  .overlay .btn {
    margin-top: 4px;
    padding: 6px 20px;
    background: #C41E3A;
    color: #0d1117;
    border: none;
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .overlay .btn:hover { opacity: 0.8; }

  .back {
    position: fixed;
    top: 16px;
    left: 16px;
    font-size: 11px;
    color: #484f58;
    text-decoration: none;
    transition: color 0.15s;
  }
  .back:hover { color: #C41E3A; }

  .high-score {
    font-size: 11px;
    color: #30363d;
    margin-top: 4px;
  }
  .high-score span { color: #484f58; }

  @media (max-width: 500px) {
    canvas { width: 90vw; height: 90vw; }
  }
</style>
</head>
<body>

<a class="back" href="https://github.com/5ivesaw">← github.com/5ivesaw</a>

<div class="header">
  <h1>5ivesaw snake</h1>
  <div class="score" aria-live="polite">score <span id="score">0</span></div>
</div>

<div style="position:relative; display:inline-block;">
  <canvas id="game" width="400" height="400" aria-label="Snake game canvas"></canvas>

  <div class="overlay active" id="start-screen" role="dialog" aria-modal="true" aria-hidden="false">
    <h2>snake</h2>
    <p>eat code. don't die.</p>
    <button class="btn" id="start-btn">start</button>
  </div>

  <div class="overlay" id="death-screen" role="dialog" aria-modal="true" aria-hidden="true">
    <h2>dead</h2>
    <p>score: <span id="final-score">0</span></p>
    <button class="btn" id="restart-btn">again</button>
  </div>
</div>

<div class="high-score">best: <span id="high-score">0</span></div>

<div class="controls">
  <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> or <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> to move<br/>
  swipe on mobile
</div>

<script>
/* ======= Config & elements ======= */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const GRID = 20;
const VIEW_SIZE = 400; // visual size in CSS pixels
let CELLS = VIEW_SIZE / GRID;

const startScreen = document.getElementById('start-screen');
const deathScreen = document.getElementById('death-screen');
const startBtn = document.getElementById('start-btn');
const restartBtn = document.getElementById('restart-btn');
const scoreEl = document.getElementById('score');
const finalScoreEl = document.getElementById('final-score');
const highScoreEl = document.getElementById('high-score');

const LOCAL_KEY = '5ivesaw-snake-hs';
let highScore = Number(localStorage.getItem(LOCAL_KEY)) || 0;
highScoreEl.textContent = highScore;

/* food symbols */
const FOOD_SYMBOLS = ['</>','{ }','( )','[ ]','#!','::','&&','||','!=','++','**','//'];

/* ======= Game state ======= */
let snake, dir, nextDir, food, score;
let alive = false;
let speed = 110; // milliseconds per move
let lastMoveTime = 0;
let rafId = null;

/* ======= Canvas scaling for high DPI ======= */
function resizeCanvas() {
  const dpr = Math.max(1, window.devicePixelRatio || 1);
  canvas.width = VIEW_SIZE * dpr;
  canvas.height = VIEW_SIZE * dpr;
  canvas.style.width = VIEW_SIZE + 'px';
  canvas.style.height = VIEW_SIZE + 'px';
  // scale drawing operations so we can use CSS-pixel coordinates
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  CELLS = VIEW_SIZE / GRID;
}
window.addEventListener('resize', resizeCanvas);

/* ======= Init & helpers ======= */
function init() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0};
  nextDir = {x:1,y:0};
  score = 0;
  speed = 110;
  alive = true;
  scoreEl.textContent = '0';
  placeFood();
  // ensure overlays state
  startScreen.classList.remove('active');
  startScreen.setAttribute('aria-hidden', 'true');
  deathScreen.classList.remove('active');
  deathScreen.setAttribute('aria-hidden', 'true');
}

function placeFood() {
  let pos;
  do {
    pos = {x: Math.floor(Math.random()*CELLS), y: Math.floor(Math.random()*CELLS)};
  } while (snake.some(s => s.x===pos.x && s.y===pos.y));
  food = pos;
  food.symbol = FOOD_SYMBOLS[Math.floor(Math.random()*FOOD_SYMBOLS.length)];
}

/* ======= Drawing ======= */
function draw() {
  // background
  ctx.clearRect(0,0,VIEW_SIZE,VIEW_SIZE);
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0,0,VIEW_SIZE,VIEW_SIZE);

  // subtle grid
  ctx.strokeStyle = '#161b22';
  ctx.lineWidth = 0.5;
  for(let i=0;i<=CELLS;i++){
    ctx.beginPath(); ctx.moveTo(i*GRID,0); ctx.lineTo(i*GRID,VIEW_SIZE); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i*GRID); ctx.lineTo(VIEW_SIZE,i*GRID); ctx.stroke();
  }

  // food
  ctx.fillStyle = '#8b949e';
  ctx.font = '11px JetBrains Mono, monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(food.symbol, food.x*GRID+GRID/2, food.y*GRID+GRID/2);

  // snake
  snake.forEach((seg, i) => {
    const alpha = 1 - (i / snake.length) * 0.5;
    ctx.fillStyle = i===0 ? '#C41E3A' : `rgba(196,30,58,${alpha})`;
    ctx.fillRect(seg.x*GRID+1, seg.y*GRID+1, GRID-2, GRID-2);
  });

  // head glow
  ctx.shadowColor = '#C41E3A';
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#C41E3A';
  ctx.fillRect(snake[0].x*GRID+1, snake[0].y*GRID+1, GRID-2, GRID-2);
  ctx.shadowBlur = 0;
}

/* ======= Game logic ======= */
function update() {
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // wrap
  if(head.x < 0) head.x = CELLS-1;
  if(head.x >= CELLS) head.x = 0;
  if(head.y < 0) head.y = CELLS-1;
  if(head.y >= CELLS) head.y = 0;

  // self collision
  if(snake.some(s => s.x===head.x && s.y===head.y)) {
    die();
    return;
  }

  snake.unshift(head);

  if(head.x===food.x && head.y===food.y) {
    score++;
    scoreEl.textContent = score;
    placeFood();
    // speed up slightly
    if(speed > 60) speed = Math.max(40, speed - 2);
  } else {
    snake.pop();
  }
}

function tick() {
  if (!alive) return;
  update();
  draw();
}

/* ======= Animation loop using rAF ======= */
function loop(ts) {
  if (!lastMoveTime) lastMoveTime = ts;
  if (ts - lastMoveTime >= speed) {
    tick();
    lastMoveTime = ts;
  }
  rafId = requestAnimationFrame(loop);
}

/* ======= Death handling ======= */
function die() {
  alive = false;
  cancelAnimationFrame(rafId);
  if(score > highScore) {
    highScore = score;
    localStorage.setItem(LOCAL_KEY, String(highScore));
    highScoreEl.textContent = highScore;
  }
  finalScoreEl.textContent = score;
  deathScreen.classList.add('active');
  deathScreen.setAttribute('aria-hidden', 'false');
  startBtn.focus();
}

/* ======= Start / restart ======= */
function startGame() {
  startScreen.classList.remove('active');
  startScreen.setAttribute('aria-hidden', 'true');
  deathScreen.classList.remove('active');
  deathScreen.setAttribute('aria-hidden', 'true');

  init();
  resizeCanvas();
  draw();
  lastMoveTime = 0;
  rafId = requestAnimationFrame(loop);
}

/* ======= Input: keyboard ======= */
document.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();
  if((key==='arrowup'||key==='w') && dir.y!==1) nextDir={x:0,y:-1};
  if((key==='arrowdown'||key==='s') && dir.y!==-1) nextDir={x:0,y:1};
  if((key==='arrowleft'||key==='a') && dir.x!==1) nextDir={x:-1,y:0};
  if((key==='arrowright'||key==='d') && dir.x!==-1) nextDir={x:1,y:0};
  if(key===' ' && !alive) startGame();
});

/* ======= Input: touch (swipe) ======= */
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  // don't block pinch/zoom at page-level; only track single-touch swipes
  if (e.touches.length === 1) {
    touchStart = {x: e.touches[0].clientX, y: e.touches[0].clientY};
  } else {
    touchStart = null;
  }
});
canvas.addEventListener('touchend', e => {
  if(!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  if(Math.abs(dx) > Math.abs(dy)) {
    if(dx > 20 && dir.x !== -1) nextDir={x:1,y:0};
    if(dx < -20 && dir.x !== 1) nextDir={x:-1,y:0};
  } else {
    if(dy > 20 && dir.y !== -1) nextDir={x:0,y:1};
    if(dy < -20 && dir.y !== 1) nextDir={x:0,y:-1};
  }
  touchStart = null;
}, {passive: true});

/* ======= UI hooks ======= */
startBtn.addEventListener('click', startGame);
restartBtn.addEventListener('click', startGame);

/* ======= Boot ======= */
resizeCanvas();
init();
draw();
// put focus on start button for keyboard users
startBtn.focus();
</script>
</body>
</html>
