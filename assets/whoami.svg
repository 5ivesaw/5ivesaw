<svg width="920" height="320" viewBox="0 0 920 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">FiveSaw identity terminal</title>
  <desc id="desc">Terminal-style card reading: whoami. NAME FiveSaw. ROLE Independent Developer. FOCUS Game systems, browser worlds, autonomous agents. CURRENT SawBot.</desc>
  <defs>
    <style>
      .card  { fill: #170f0f; stroke: #3a2626; stroke-width: 1; }
      .bar   { fill: #1f1414; }
      .title { fill: #a08b85; font: 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .label { fill: #a08b85; font: 14px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; letter-spacing: 1.5px; }
      .value { fill: #f3ece7; font: 15px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .acc   { fill: #c2504a; font: 15px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>
  <rect x="0.5" y="0.5" width="919" height="319" rx="14" class="card"/>
  <path d="M14,0.5 H906 A13.5,13.5 0 0 1 919.5,14 V50 H0.5 V14 A13.5,13.5 0 0 1 14,0.5 Z" class="bar"/>
  <line x1="0.5" y1="50" x2="919.5" y2="50" stroke="#3a2626" stroke-width="1"/>
  <circle cx="26" cy="25.0" r="6" fill="#8f4a45"/>
  <circle cx="46" cy="25.0" r="6" fill="#a3823f"/>
  <circle cx="66" cy="25.0" r="6" fill="#4a7d55"/>
  <text x="460" y="29" text-anchor="middle" class="title">whoami.sh</text>
  <text x="34" y="100"><tspan class="acc">$</tspan><tspan class="value"> whoami</tspan></text>
  <text x="34" y="134"><tspan class="label">NAME</tspan><tspan class="acc" x="150">&gt;</tspan><tspan class="value" x="172">FiveSaw</tspan></text>
  <text x="34" y="168"><tspan class="label">ROLE</tspan><tspan class="acc" x="150">&gt;</tspan><tspan class="value" x="172">Independent Developer</tspan></text>
  <text x="34" y="202"><tspan class="label">FOCUS</tspan><tspan class="acc" x="150">&gt;</tspan><tspan class="value" x="172">Game systems, browser worlds, autonomous agents</tspan></text>
  <text x="34" y="236"><tspan class="label">CURRENT</tspan><tspan class="acc" x="150">&gt;</tspan><tspan class="value" x="172">SawBot</tspan></text>
  <text x="34" y="280"><tspan class="acc">$</tspan><tspan class="value"> _</tspan></text>
  <rect x="58" y="266" width="9" height="16" fill="#c2504a">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1.4s" repeatCount="indefinite"/>
  </rect>
</svg>
