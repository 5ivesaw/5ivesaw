name: Generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write

    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate themed contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: 5ivesaw
          outputs: |
            dist/fivesaw-snake.svg?color_snake=#c2504a&color_dots=#170f0f,#3a2626,#6b302d,#a43f3a,#f06a61

      - name: Publish snake
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
