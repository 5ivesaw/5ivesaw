name: Generate contribution snake

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/snake.yml"

  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write

    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate themed contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: 5ivesaw
          outputs: |
            dist/fivesaw-snake.svg?color_snake=#f3ece7&color_dots=#170f0f,#332020,#66302d,#a9433e,#f06a61

      - name: Publish snake
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
