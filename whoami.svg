<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .win   { fill: #0d1117; stroke: #30363d; stroke-width: 1; }
      .bar   { fill: #161b22; }
      .fname { fill: #6e7681; font: 12px 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
      .key   { fill: #6e7681; font: 15px 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; letter-spacing: 1px; }
      .val   { fill: #c9d1d9; font: 15px 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
      .acc   { fill: #58a6ff; font: 15px 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
      .node  { fill: rgba(88,166,255,0.10); stroke: #58a6ff; stroke-width: 1.2; }
      .edge  { stroke: #58a6ff; stroke-width: 1.2; opacity: 0.35; }
    </style>
  </defs>

  <rect x="0.5" y="0.5" width="899" height="299" rx="14" class="win"/>
  <path d="M14,0.5 H886 A13.5,13.5 0 0 1 899.5,14 V40 H0.5 V14 A13.5,13.5 0 0 1 14,0.5 Z" class="bar"/>
  <circle cx="30" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="52" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="74" cy="20" r="6" fill="#27c93f"/>
  <text x="450" y="24" text-anchor="middle" class="fname">whoami.sh</text>

  <!-- terminal content -->
  <g>
    <text x="34" y="82"><tspan class="acc">$</tspan><tspan class="val"> whoami</tspan></text>
    <text x="34" y="116"><tspan class="key">NAME</tspan><tspan class="val" x="130">Your Name</tspan></text>
    <text x="34" y="148"><tspan class="key">ROLE</tspan><tspan class="val" x="130">Software Engineer</tspan></text>
    <text x="34" y="180"><tspan class="key">FOCUS</tspan><tspan class="val" x="130">Backend systems, developer tooling</tspan></text>
    <text x="34" y="212"><tspan class="key">CURRENT</tspan><tspan class="val" x="130">Building something worth shipping</tspan></text>
    <text x="34" y="244"><tspan class="acc">$</tspan><tspan class="val"> _</tspan></text>
    <rect x="58" y="230" width="10" height="16" fill="#58a6ff">
      <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- node graph signature -->
  <g>
    <line x1="640" y1="100" x2="720" y2="80" class="edge"/>
    <line x1="720" y1="80" x2="790" y2="130" class="edge"/>
    <line x1="640" y1="100" x2="670" y2="175" class="edge"/>
    <line x1="670" y1="175" x2="760" y2="210" class="edge"/>
    <line x1="790" y1="130" x2="760" y2="210" class="edge"/>
    <line x1="670" y1="175" x2="655" y2="235" class="edge"/>

    <circle cx="640" cy="100" r="7" class="node"/>
    <circle cx="720" cy="80"  r="6" class="node"/>
    <circle cx="790" cy="130" r="7" class="node"/>
    <circle cx="670" cy="175" r="6" class="node"/>
    <circle cx="760" cy="210" r="7" class="node"/>
    <circle cx="655" cy="235" r="5" class="node"/>
  </g>
</svg>
